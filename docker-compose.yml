services:

  pipeline:
    build: .
    image: weather
    container_name: weather-pipeline
    restart: unless-stopped
    command: tail -f /dev/null
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1

  web:
    image: weather
    container_name: weather-web
    restart: unless-stopped
    command: streamlit run app/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8501:8501"
    depends_on:
      - pipeline
    environment:
      - PYTHONUNBUFFERED=1

  ngrok:
    image: ngrok/ngrok:latest
    container_name: weather-ngrok
    restart: unless-stopped
    command: http web:8501 --log=/logs/ngrok.log
    volumes:
      - ./logs:/logs
    ports:
      - "4040:4040"
    depends_on:
      - web
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
