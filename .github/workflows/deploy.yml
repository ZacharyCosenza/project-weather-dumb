on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and restart containers
        run: docker compose up --build -d

      - name: Verify containers are running
        run: |
          docker compose ps --format json | python3 -c "
          import json, sys
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          unhealthy = [s['Name'] for s in services if s.get('State') != 'running']
          if unhealthy:
              print('Unhealthy containers:', unhealthy)
              sys.exit(1)
          "

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deploy failed on $(hostname) at $(date). Check logs with 'docker compose logs'."
